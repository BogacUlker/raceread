services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    expose:
      - "8000"
    volumes:
      - ./data:/app/data:ro
      - ./backend:/app/backend:ro
    environment:
      - CORS_ORIGINS=${CORS_ORIGINS:-https://raceread.app}
      - DATA_DIR=/app/data
    command: uvicorn backend.app.main:app --host 0.0.0.0 --port 8000 --workers 2
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=5)"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 15s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - default
      - homelab_homelab

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=https://raceread.app
    ports:
      - "4000:3000"
    environment:
      - VITE_API_URL=https://raceread.app
      - API_URL_INTERNAL=http://backend:8000
      # fixed public origin so SSR fetches stay same-origin no matter what
      # Host header probes send (stops the 500 + CORS noise on direct-IP hits)
      - ORIGIN=https://raceread.app
    depends_on:
      - backend
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/').then((r) => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 20s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

networks:
  homelab_homelab:
    external: true
