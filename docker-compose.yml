services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data:ro
      - ./backend:/app/backend
    environment:
      - CORS_ORIGINS=${CORS_ORIGINS:-*}
      - DATA_DIR=/app/data
    command: uvicorn backend.app.main:app --host 0.0.0.0 --port 8000 --reload
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=http://46.225.19.63:8000
    ports:
      - "4000:3000"
    environment:
      - VITE_API_URL=http://46.225.19.63:8000
      - API_URL_INTERNAL=http://backend:8000
    depends_on:
      - backend
    restart: unless-stopped
